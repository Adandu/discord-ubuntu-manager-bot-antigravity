services:
  discobunty:
    image: ghcr.io/adandu/discobunty:latest
    # build: . # Uncomment to build locally
    container_name: discobunty
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./ssh_keys:/app/ssh_keys:ro
      - ./.ssh:/app/.ssh
      - ./config.json:/app/config.json
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - discobunty-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  discobunty-net:
    driver: bridge
