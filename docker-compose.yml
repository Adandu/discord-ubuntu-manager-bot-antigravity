services:
  ubuntu-manager-bot:
    image: ghcr.io/adandu/discord-ubuntu-manager-bot:latest
    # build: . # Uncomment to build locally
    container_name: discord-ubuntu-manager
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - SERVERS_JSON=${SERVERS_JSON}
      - ENABLE_DOCKER=${ENABLE_DOCKER:-false}
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
