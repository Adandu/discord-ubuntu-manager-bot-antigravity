name: Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m py_compile main.py app_state.py bot_app.py web_app.py models.py ssh_manager.py config_manager.py crypto_utils.py auth_utils.py

      - name: Run unit tests
        run: python -m pytest -q
